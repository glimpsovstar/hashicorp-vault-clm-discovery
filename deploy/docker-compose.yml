services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clm
      POSTGRES_PASSWORD: clm
      POSTGRES_DB: clm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ../migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://clm:clm@postgres:5432/clm?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgres://clm:clm@postgres:5432/clm?sslmode=disable
      ADDR: ":8080"
      ALLOW_PRIVATE_RANGES: "true"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
