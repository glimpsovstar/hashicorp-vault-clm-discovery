name: clm-uat

x-endpoint: &endpoint
  image: nginx:1.27-alpine
  volumes:
    - ./certs:/certs:ro
    - ./nginx/endpoint.conf.template:/etc/nginx/templates/default.conf.template:ro
  # Healthy only once envsubst rendered the config AND nginx is running (i.e.
  # listening on 443). Lets `up --wait` gate the scan on real endpoint readiness,
  # which prevents the scan from racing past not-yet-listening endpoints.
  healthcheck:
    test: ["CMD-SHELL", "test -f /etc/nginx/conf.d/default.conf && pidof nginx >/dev/null"]
    interval: 2s
    timeout: 2s
    retries: 20
  depends_on:
    gen-certs:
      condition: service_completed_successfully

services:
  gen-certs:
    image: golang:1.22-alpine
    working_dir: /src/test/uat
    volumes:
      - ../../:/src
    command: ["go", "run", "./gen-certs", "/src/test/uat/certs"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clm
      POSTGRES_PASSWORD: clm
      POSTGRES_DB: clm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ../../migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://clm:clm@postgres:5432/clm?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgres://clm:clm@postgres:5432/clm?sslmode=disable
      ADDR: ":8080"
      ALLOW_PRIVATE_RANGES: "true"
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "8080:8080"

  # Opt-in Vault dev server for managed-vs-shadow validation. Off by default
  # (profiles: [vault]); start with:
  #   VAULT_ADDR=http://vault:8200 VAULT_TOKEN=root \
  #     docker compose -f docker-compose.uat.yml --profile vault up -d --build
  vault:
    image: hashicorp/vault:1.17
    profiles: ["vault"]
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev

  # One HTTPS endpoint per matrix cert. All share the certs volume and the
  # nginx entrypoint that renders /etc/nginx/templates/default.conf.template
  # (default envsubst suffix; using ${ID}) into /etc/nginx/conf.d/default.conf.
  uat-expired:   { <<: *endpoint, environment: { ID: expired } }
  uat-exp-7:     { <<: *endpoint, environment: { ID: exp-7 } }
  uat-exp-14:    { <<: *endpoint, environment: { ID: exp-14 } }
  uat-exp-15:    { <<: *endpoint, environment: { ID: exp-15 } }
  uat-exp-30:    { <<: *endpoint, environment: { ID: exp-30 } }
  uat-exp-45:    { <<: *endpoint, environment: { ID: exp-45 } }
  uat-exp-60:    { <<: *endpoint, environment: { ID: exp-60 } }
  uat-exp-61:    { <<: *endpoint, environment: { ID: exp-61 } }
  uat-valid-99:  { <<: *endpoint, environment: { ID: valid-99 } }
  uat-valid-400: { <<: *endpoint, environment: { ID: valid-400 } }

  # Opt-in real external cert lane: issues a Let's Encrypt STAGING cert via
  # HTTP-01 for LE_DOMAIN (test/uat/.env, gitignored) and serves it over
  # HTTPS. Off by default (profiles: [letsencrypt]); requires a public
  # domain pointing at this host with :80 reachable from the internet:
  #   cd test/uat && cp .env.example .env   # fill in real ACME_EMAIL + LE_DOMAIN
  #   docker compose -f docker-compose.uat.yml --profile letsencrypt up -d --build
  lego:
    image: goacme/lego:v4
    profiles: ["letsencrypt"]
    env_file: [.env]
    volumes:
      - ./le:/le
    # HTTP-01 needs :80 reachable from the internet on LE_DOMAIN.
    command: >
      --path /le --email ${ACME_EMAIL} --server https://acme-staging-v02.api.letsencrypt.org/directory
      --domains ${LE_DOMAIN} --http --http.port :80 --accept-tos run
    ports: ["80:80"]

  uat-letsencrypt:
    image: nginx:1.27-alpine
    profiles: ["letsencrypt"]
    env_file: [.env]
    volumes:
      - ./le:/le:ro
      - ./nginx/le.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      lego:
        condition: service_completed_successfully
